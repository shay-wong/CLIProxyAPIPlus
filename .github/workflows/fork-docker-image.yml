name: Publish fork Docker image

on:
  workflow_call:
    inputs:
      release_ref:
        required: true
        type: string
      release_name:
        required: true
        type: string
      dockerhub_name:
        required: false
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: read
  packages: write

env:
  APP_NAME: CLIProxyAPI

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Resolve release tag
        id: release
        env:
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          INPUT_RELEASE_REF: ${{ inputs.release_ref }}
        run: |
          set -euo pipefail

          release_tag="${INPUT_RELEASE_NAME}"
          release_ref="${INPUT_RELEASE_REF}"
          release_tag="${release_tag#refs/tags/}"

          if [[ ! "$release_ref" =~ ^refs/tags/ ]]; then
            release_ref="refs/tags/${release_tag}"
          fi

          if [[ ! "$release_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-fork\.[0-9]+)?$ ]]; then
            echo "Unsupported release tag: ${release_tag}" >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor_number="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          suffix="${BASH_REMATCH[4]}"
          base="${major}.${minor_number}.${patch}"

          {
            echo "ref=${release_ref}"
            echo "tag=${release_tag}"
            echo "version=${base}${suffix}"
            echo "base=${base}"
            echo "minor=${major}.${minor_number}"
            echo "major=${major}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.ref }}

      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Convert image name to lowercase
        id: repo
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY@L}" >> "$GITHUB_OUTPUT"

      - name: Resolve Docker Hub repository
        id: dockerhub
        env:
          INPUT_DOCKERHUB_NAME: ${{ inputs.dockerhub_name }}
          VAR_DOCKERHUB_NAME: ${{ vars.DOCKERHUB_NAME }}
        run: |
          set -euo pipefail

          dockerhub_name="${INPUT_DOCKERHUB_NAME:-$VAR_DOCKERHUB_NAME}"
          if [[ -z "$dockerhub_name" ]]; then
            echo "Docker Hub namespace is not configured. Set repository variable DOCKERHUB_NAME or pass dockerhub_name to this workflow." >&2
            exit 1
          fi

          if [[ ! "$dockerhub_name" =~ ^[a-z0-9][a-z0-9_.-]*$ ]]; then
            echo "Invalid Docker Hub namespace: ${dockerhub_name}" >&2
            exit 1
          fi

          echo "image=${dockerhub_name}/cli-proxy-api" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ steps.repo.outputs.image }}
            ${{ steps.dockerhub.outputs.image }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.release.outputs.tag }}
            type=raw,value=${{ steps.release.outputs.version }}
            type=raw,value=${{ steps.release.outputs.base }}
            type=raw,value=${{ steps.release.outputs.minor }}
            type=raw,value=${{ steps.release.outputs.major }}
            type=sha,prefix=sha-

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate build metadata
        run: |
          {
            echo "VERSION=${{ steps.release.outputs.tag }}"
            echo "COMMIT=$(git rev-parse --short HEAD)"
            echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_ENV"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
